backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

editor:
  preview: false

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "MMMM D, YYYY", dateFormat: "MMMM D, YYYY", timeFormat: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Fire Prevention", value: "fire" }
          - { label: "Emergency Management", value: "em" }
          - { label: "OSHA Compliance", value: "osha" }
          - { label: "Insurance", value: "ins" }
      - { label: "Thumbnail Image (Optional)", name: "thumbnail", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text", hint: "1-2 sentences shown on the blog listing page" }
      - { label: "Read Time", name: "readtime", widget: "string", hint: "e.g. 4 min read" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "resources"
    label: "Resources"
    folder: "_resources"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Folder"
        name: "folder"
        widget: "select"
        options:
          - { label: "ICS Forms", value: "ICS Forms" }
          - { label: "EAP Templates", value: "EAP Templates" }
          - { label: "Fire Prevention", value: "Fire Prevention" }
          - { label: "Training Materials", value: "Training Materials" }
      - { label: "Description", name: "description", widget: "text", hint: "Short description shown on the resource card" }
      - label: "File Type"
        name: "filetype"
        widget: "select"
        options:
          - { label: "PDF", value: "pdf" }
          - { label: "Word Document (.docx)", value: "docx" }
          - { label: "PowerPoint (.pptx)", value: "pptx" }
          - { label: "Excel (.xlsx)", value: "xlsx" }
          - { label: "Image", value: "img" }
          - { label: "ZIP", value: "zip" }
      - { label: "File URL", name: "fileurl", widget: "string", hint: "Paste the raw GitHub URL to the file" }
      - { label: "Preview Image (Optional)", name: "preview", widget: "image", required: false, hint: "Upload a screenshot or thumbnail of the resource" }
      - { label: "Display Order", name: "order", widget: "number", default: 1, hint: "Lower numbers appear first within a folder" }
