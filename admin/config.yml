backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

editor:
  preview: false

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "date", format: "MMMM D, YYYY", dateFormat: "MMMM D, YYYY", timeFormat: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Fire Prevention", value: "fire" }
          - { label: "Emergency Management", value: "em" }
          - { label: "OSHA Compliance", value: "osha" }
          - { label: "Insurance", value: "ins" }
      - { label: "Thumbnail Image (Optional)", name: "thumbnail", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text", hint: "1-2 sentences shown on the blog listing page" }
      - { label: "Read Time", name: "readtime", widget: "string", hint: "e.g. 4 min read", default: "5 min read" }
      - { label: "Body", name: "body", widget: "markdown", modes: ["rich_text"] }
